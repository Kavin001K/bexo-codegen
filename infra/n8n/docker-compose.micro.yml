# Low-cost n8n stack for e2-micro (~$6–8/mo on GCP)
# No Redis, no worker — fine for MVP portfolio builds
# Usage: docker compose -f docker-compose.micro.yml up -d
# Recovery: bash recover-n8n.sh

services:
  postgres:
    image: postgres:16-alpine
    container_name: bexo-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    mem_limit: 256m
    shm_size: 64mb

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.20.9
    container_name: bexo-n8n
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-https://n8n.mybexo.com/}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - EXECUTIONS_MODE=regular
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - BEXO_INTERNAL_SECRET=${BEXO_INTERNAL_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENROUTER_MODEL_SPEC=${OPENROUTER_MODEL_SPEC:-openrouter/free}
      - CLOUD_RUN_BUILD_URL=${CLOUD_RUN_BUILD_URL:-https://bexo-codegen-901109516440.us-central1.run.app}
      # Cloudflare + other secrets: env_file only (.env). Do NOT list CLOUDFLARE_* here —
      # environment: overrides env_file and ${VAR:-} can wipe values (e.g. tokens with #).
      - PORTFOLIO_DOMAIN=${PORTFOLIO_DOMAIN:-mybexo.com}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:5678/healthz >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s

volumes:
  n8n_data:
  postgres_data:
