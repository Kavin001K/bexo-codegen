# Render Blueprint — BEXO n8n orchestrator
# Deploy: Render Dashboard → New → Blueprint → connect this repo path
# Or: copy services below into Render dashboard manually

services:
  - type: web
    name: bexo-n8n
    runtime: image
    image:
      url: docker.n8n.io/n8nio/n8n:latest
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: "5678"
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      - key: N8N_ENCRYPTION_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: bexo-n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: bexo-n8n-db
          property: port
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: bexo-n8n-db
          property: database
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: bexo-n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: bexo-n8n-db
          property: password
      - key: GENERIC_TIMEZONE
        value: UTC
      - key: N8N_LOG_LEVEL
        value: info
      # Set in Render dashboard (Environment):
      # N8N_WEBHOOK_SECRET, BEXO_INTERNAL_SECRET, OPENROUTER_API_KEY
      # SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, CLOUD_RUN_BUILD_URL
      # DEEPSEEK_MODEL_SPEC=deepseek/deepseek-chat

databases:
  - name: bexo-n8n-db
    plan: starter
    databaseName: n8n
    user: n8n
