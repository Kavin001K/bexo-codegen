steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/bexo/codegen:$BUILD_ID
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/bexo/codegen:$BUILD_ID
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - bexo-codegen
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/bexo/codegen:$BUILD_ID
      - --platform=managed
      - --region=us-central1
      - --memory=2Gi
      - --cpu=2
      - --timeout=300
      - --max-instances=5
      - --allow-unauthenticated
      - --service-account=bexo-codegen@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GCS_BUCKET=bexo-portfolios,GCS_PUBLIC_BUCKET=bexo-sites-public,GITHUB_ORG=bexo-sites,PORTFOLIO_DOMAIN=mybexo.com,RUN_LIGHTHOUSE=false,OPENROUTER_FREE_ONLY=true,OPENROUTER_MODEL_GENERATE=openrouter/free,OPENROUTER_MODEL_FIX=openrouter/free,OPENROUTER_MODEL_MODERATION=openrouter/free,MAX_OUTPUT_TOKENS=4096,OPENROUTER_FREE_MAX_TOKENS=4096,TEST_MAX_SMALL_TOUCH_TARGETS=2
      - --set-secrets=DEEPSEEK_API_KEY=deepseek-api-key:latest,KIMI_API_KEY=kimi-api-key:latest,OPENROUTER_API_KEY=openrouter-api-key:latest,GITHUB_TOKEN=github-token:latest,N8N_CALLBACK_URL=n8n-callback-url:latest,BEXO_INTERNAL_SECRET=bexo-internal-secret:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-key:latest,SUPABASE_URL=supabase-url:latest

options:
  machineType: E2_HIGHCPU_8
